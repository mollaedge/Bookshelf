<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Welcome Back</h2>
    <p class="login-subtitle">Sign in to your Bookshelf account</p>

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSignIn()" [formGroup]="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="you@example.com"
          class="form-control">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            formControlName="password"
            placeholder="Your password"
            class="form-control">
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
              @if (isLoading) {
                <span>Signing in...</span>
              }
              @if (!isLoading) {
                <span>Log In</span>
              }
            </button>
          </div>
        </form>

        <div class="google-signin">
          <div class="divider"><span>OR</span></div>
          <div id="google-button-container"></div>
        </div>

        <div class="form-footer">
          <p>Don't have an account? <a routerLink="/auth/register">Register</a></p>
        </div>
      </div>
    </div>
