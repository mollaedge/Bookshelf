<div class="pdf-reader-wrapper">

  <!-- Toolbar -->
  <div class="pdf-toolbar">
    <div class="toolbar-left">
      <i class="fas fa-file-pdf pdf-icon"></i>
      <span class="pdf-title">PDF Reader</span>
    </div>

    <div class="toolbar-center">
      <button class="toolbar-btn" (click)="prevPage()" [disabled]="currentPage <= 1" title="Previous page">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div class="page-input-group">
        <span class="page-label">Page</span>
        <input
          type="number"
          class="page-input"
          [(ngModel)]="currentPage"
          [min]="1"
          (change)="onPageInput($event)"
          />
        </div>
        <button class="toolbar-btn" (click)="nextPage()" title="Next page">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <div class="toolbar-right">
        <button class="toolbar-btn" (click)="zoomOut()" [disabled]="zoom <= 40" title="Zoom out">
          <i class="fas fa-search-minus"></i>
        </button>
        <button class="toolbar-btn zoom-label" (click)="resetZoom()" title="Reset zoom">
          {{ zoom }}%
        </button>
        <button class="toolbar-btn" (click)="zoomIn()" [disabled]="zoom >= 300" title="Zoom in">
          <i class="fas fa-search-plus"></i>
        </button>
      </div>
    </div>

    <!-- Body -->
    <div class="pdf-body">

      @if (loadError) {
        <div class="error-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p>Failed to load PDF. Please check the URL and try again.</p>
        </div>
      }

      @if (!pdfSrc) {
        <div class="empty-state">
          <i class="fas fa-file-pdf"></i>
          <p>No PDF source provided.</p>
          <span>Pass <code>?src=&lt;url&gt;</code> and optionally <code>&page=&lt;n&gt;</code> as query params.</span>
        </div>
      }

      <!-- iframe PDF viewer -->
      @if (pdfSrc && !loadError && isBrowser) {
        <div class="viewer-container">
          <iframe
            [src]="safeUrl"
            class="pdf-iframe"
            allowfullscreen
          ></iframe>
        </div>
      }

    </div>

  </div>
