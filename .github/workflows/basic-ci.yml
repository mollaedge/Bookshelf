name: Basic CI

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: Test and Build API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x api/mvnw

      - name: Run unit tests
        working-directory: api
        run: ./mvnw test
        env:
          JASYPT_ENCRYPTOR_PASSWORD: testpassword

      - name: Run integration tests
        working-directory: api
        run: ./mvnw verify -Dsurefire.skip=true
        env:
          JASYPT_ENCRYPTOR_PASSWORD: testpassword

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bookshelf-api-jar
          path: api/target/*.jar
          retention-days: 5

  build-client:
    name: Build Angular Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build Angular app
        working-directory: client
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: angular-client-dist
          path: client/dist/
          retention-days: 5

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: [test-and-build, build-client]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: hetzner-bookshelf

    steps:
      - name: Download API JAR
        uses: actions/download-artifact@v4
        with:
          name: bookshelf-api-jar
          path: artifacts/api

      - name: Download Angular dist
        uses: actions/download-artifact@v4
        with:
          name: angular-client-dist
          path: artifacts/client

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Copy API JAR to server
        run: |
          scp -i ~/.ssh/deploy_key \
            artifacts/api/*.jar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/bookshelf/api/bookshelf-api.jar

      - name: Copy Angular dist to server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            artifacts/client/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/bookshelf/

      - name: Restart API service
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "sudo systemctl restart bookshelf-api && sudo systemctl status bookshelf-api --no-pager"
