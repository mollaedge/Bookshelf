name: Basic CI

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Deploy to Hetzner
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: hetzner-bookshelf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x api/mvnw

      - name: Build API
        working-directory: api
        run: ./mvnw package -DskipTests
        env:
          JASYPT_ENCRYPTOR_PASSWORD: testpassword

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build Angular app
        working-directory: client
        run: npm run build

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Copy API JAR to server
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /opt/bookshelf/api"
          scp -i ~/.ssh/deploy_key \
            api/target/*.jar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/opt/bookshelf/api/bookshelf-api.jar

      - name: Copy Angular dist to server
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /var/www/bookshelf"
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            client/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/bookshelf/

      - name: Start API service
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "pkill -f 'bookshelf-api.jar' || true; nohup java -jar /opt/bookshelf/api/bookshelf-api.jar > /opt/bookshelf/api/app.log 2>&1 &"

      - name: Start Angular app
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd /var/www/bookshelf && pkill -f 'npm start' || true; nohup npm start > /var/www/bookshelf/app.log 2>&1 &"
