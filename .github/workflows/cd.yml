name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Push and Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: hetzner-bookshelf
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── API: build Docker image ────────────────────────────────────────────────
      - name: Build API Docker image
        run: docker build -t bookshelf-api:latest ./api

      # ── Client: build Angular app ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Inject production environment values
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          sed -i \
            -e "s|__GOOGLE_CLIENT_ID__|${GOOGLE_CLIENT_ID}|g" \
            -e "s|__REDIRECT_URI__|http://${SERVER_IP}/dashboard/dash|g" \
            client/src/environments/environment.prod.ts

      - name: Build Angular app
        working-directory: client
        run: npm run build

      # ── SSH setup ─────────────────────────────────────────────────────────────
      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host hetzner
            HostName ${{ secrets.SERVER_IP }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
      # ── Ensure PostgreSQL is running on the server ──────────────────────────
      - name: Ensure PostgreSQL container is running
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
        run: |
          ssh hetzner bash -s << EOF
          if docker ps --filter name=my-postgres --filter status=running --format '{{.Names}}' | grep -q my-postgres; then
            echo "PostgreSQL already running."
          elif docker ps -a --filter name=my-postgres --format '{{.Names}}' | grep -q my-postgres; then
            echo "Starting existing PostgreSQL container."
            docker start my-postgres
          else
            echo "Creating PostgreSQL container."
            docker run -d \
              --name my-postgres \
              -e POSTGRES_PASSWORD=$(printf '%q' "${DB_PASSWORD}") \
              -e POSTGRES_USER=$(printf '%q' "${DB_USERNAME}") \
              -e POSTGRES_DB=bookshelf \
              -p 5433:5432 \
              -v pgdata:/var/lib/postgresql/data \
              postgres:16
          fi
          EOF
      # ── Copy files to server ──────────────────────────────────────────────────
      - name: Ensure Node.js is installed on server
        run: |
          ssh hetzner bash -s << 'EOF'
          if command -v node >/dev/null 2>&1; then
            echo "Node.js already installed: $(node --version)"
          else
            echo "Installing Node.js 20..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
          fi
          EOF

      - name: Copy docker-compose.yml to server
        run: |
          ssh hetzner "mkdir -p /opt/bookshelf"
          scp docker-compose.yml hetzner:/opt/bookshelf/docker-compose.yml

      - name: Copy Angular dist to server
        run: |
          ssh hetzner "mkdir -p /var/www/bookshelf"
          rsync -avz --delete -e ssh \
            client/dist/ \
            hetzner:/var/www/bookshelf/

      # ── Transfer image and restart API ────────────────────────────────────────
      - name: Stream API image to server
        run: docker save bookshelf-api:latest | gzip | ssh hetzner 'docker load'

      - name: Restart API container
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JASYPT_ENCRYPTOR_PASSWORD: ${{ secrets.JASYPT_ENCRYPTOR_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          ssh hetzner "mkdir -p /opt/bookshelf"
          ssh hetzner "cd /opt/bookshelf && \
            API_IMAGE=bookshelf-api:latest \
            DB_HOST=host.docker.internal \
            DB_PORT=5433 \
            DB_NAME=bookshelf \
            DB_USERNAME='${DB_USERNAME}' \
            DB_PASSWORD='${DB_PASSWORD}' \
            GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}' \
            GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}' \
            JASYPT_ENCRYPTOR_PASSWORD='${JASYPT_ENCRYPTOR_PASSWORD}' \
            JWT_SECRET_KEY='${JWT_SECRET_KEY}' \
            MAIL_USERNAME='${MAIL_USERNAME}' \
            MAIL_PASSWORD='${MAIL_PASSWORD}' \
            CORS_ALLOWED_ORIGINS='${CORS_ALLOWED_ORIGINS}' \
            docker compose up -d api"

      - name: Start Angular app
        run: |
          ssh hetzner "mkdir -p /var/www/bookshelf"
          ssh hetzner "pkill -f 'server.mjs'; true"
          ssh hetzner "setsid nohup node /var/www/bookshelf/client/server/server.mjs >> /var/www/bookshelf/app.log 2>&1 < /dev/null"

      # ── Configure nginx reverse proxy ─────────────────────────────────────────
      - name: Configure nginx
        run: |
          ssh hetzner bash -s << 'EOF'
          apt-get install -y nginx
          cat > /etc/nginx/sites-available/orbilay.com << 'NGINX'
          server {
              listen 80;
              server_name orbilay.com www.orbilay.com;

              location /api/ {
                  proxy_pass http://127.0.0.1:8088;
                  proxy_redirect off;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }

              location / {
                  proxy_pass http://127.0.0.1:4000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
                  add_header Cross-Origin-Opener-Policy unsafe-none always;
              }
          }
          NGINX
          ln -sf /etc/nginx/sites-available/orbilay.com /etc/nginx/sites-enabled/orbilay.com
          rm -f /etc/nginx/sites-enabled/default
          nginx -t && systemctl reload nginx
          EOF
